<link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
<style>

    .light-theme { background-color: white !important; color: black !important; }
    
    .light-theme h1, 
    .light-theme #large-text { color: black !important; }
    
    .light-theme .logo-img { 
        filter: brightness(0) !important; 
    }
    .light-theme .social-icon { border-color: #d1d5db !important; }
    .light-theme .social-icon i { color: black !important; }
    .light-theme .social-link i { 
        color: black !important; 
    }
    .light-theme .social-link { 
        border-color: #374151 !important; }
    .light-theme #theme-toggle { 
        background-color: black !important; 
    }
    .light-theme .contact-btn {
        background-color: black !important;
        color: white !important;
    }
    .light-theme #toggle-dot { 
        background-color: white !important; 
    }
    .light-theme #mobile-menu {
        background-color: black !important;
        border-color: #374151 !important; 
    }
    .light-theme #mobile-menu a {
        color: white !important;
        border-bottom-color: #374151 !important;
    }
    .light-theme #mobile-menu .contact-btn {
        background-color: white !important;
        color: black !important;
    }
    .large-text {
        font-size: 4rem !important; /* Smaller on tablets/mobile */
        line-height: 1 !important;
    }


@media (max-width: 640px) {
    .large-text {
        font-size: 2.8rem !important;
    }
}
@font-face {
  font-family: 'Gotham';
  src: url('./assets/Gotham-Book.woff2') format('woff2'); /* Adjust path and format */
  font-weight: 400;
  font-style: normal;
}
</style>
